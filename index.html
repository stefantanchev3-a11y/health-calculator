<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Здравен калкулатор</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
  padding: 30px;
}

.box {
  background: #1f1f1f;
  padding: 20px;
  border-radius: 15px;
  max-width: 450px;
  margin: auto;
}

input, select, button {
  margin: 8px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 15px;
  width: 85%;
}

button {
  background: #00c853;
  color: white;
  cursor: pointer;
}

.hidden { display: none; }

#result {
  margin-top: 15px;
  text-align: left;
  line-height: 1.6;
}

.error {
  color: #ff5252;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
<h2>🍽️ Здравен калкулатор</h2>

<!-- Основни данни -->
<input id="weight" placeholder="Тегло (кг)">
<input id="height" placeholder="Височина (см)">
<input id="age" placeholder="Възраст">

<select id="activity">
  <option value="25">Ниска активност</option>
  <option value="30">Средна активност</option>
  <option value="35">Висока активност</option>
</select>

<!-- ЦЕЛ -->
<select id="goal" onchange="updateGoal()">
  <option value="">Избери цел</option>
  <option value="maintain">Поддържане</option>
  <option value="lose">Отслабване</option>
  <option value="gain">Качване</option>
</select>

<!-- Целева тежест -->
<input id="targetWeight" class="hidden" placeholder="Целева тежест (кг)">

<button onclick="calc()">Изчисли</button>

<div id="result"></div>
</div>

<script>

/* =========================
   ПОКАЗВАНЕ НА ПОЛЕТО
   ========================= */
function updateGoal() {
  let goal = document.getElementById("goal").value;
  let target = document.getElementById("targetWeight");

  if (goal === "lose" || goal === "gain") {
    target.classList.remove("hidden");
  } else {
    target.classList.add("hidden");
  }
}

/* =========================
   ГЛАВНА ЛОГИКА
   ========================= */
function calc() {

  // INPUTS
  let w = parseFloat(document.getElementById("weight").value);
  let h = parseFloat(document.getElementById("height").value);
  let age = parseFloat(document.getElementById("age").value);
  let activity = parseFloat(document.getElementById("activity").value);
  let goal = document.getElementById("goal").value;
  let target = parseFloat(document.getElementById("targetWeight").value);

  let result = document.getElementById("result");

  // VALIDATION
  if (!w || !h || !age || !goal) {
    result.innerHTML = "<p class='error'>⚠️ Въведи всички данни</p>";
    return;
  }

  if ((goal === "lose" || goal === "gain") && !target) {
    result.innerHTML = "<p class='error'>⚠️ Въведи целева тежест</p>";
    return;
  }

  // =========================
  // КАЛОРИИ (база)
  // =========================
  let calories = w * activity;
  let targetCalories = calories;

  // =========================
  // ПРОВЕРКА НА ЦЕЛ
  // =========================
  if (goal === "lose") {
    if (target >= w) {
      result.innerHTML = "<p class='error'>❌ За отслабване целта трябва да е по-ниска</p>";
      return;
    }
    targetCalories = calories - 500;
  }

  if (goal === "gain") {
    if (target <= w) {
      result.innerHTML = "<p class='error'>❌ За качване целта трябва да е по-висока</p>";
      return;
    }
    targetCalories = calories + 300;
  }

  // =========================
  // ПРОТЕИН (адаптивен)
  // =========================
  let protein = w * 1.5;

  if (goal === "lose") protein = w * 1.8;
  if (goal === "gain") protein = w * 1.6;

  // =========================
  // МАЗНИНИ
  // =========================
  let fats = (targetCalories * 0.25) / 9;

  // =========================
  // ВЪГЛЕХИДРАТИ
  // =========================
  let carbs = (targetCalories - (protein * 4 + fats * 9)) / 4;

  // =========================
  // ВОДА (адаптивна)
  // =========================
  let water = w * 0.033;

  if (goal === "lose") water = w * 0.04;
  if (goal === "gain") water = w * 0.035;

  // =========================
  // СТЪПКИ
  // =========================
  let steps = activity == 25 ? 5000 : activity == 30 ? 8000 : 12000;

  // =========================
  // ВРЕМЕ ДО ЦЕЛ (приблизително)
  // =========================
  let diff = Math.abs(w - target || 0);
  let daysMin = Math.round(diff * 14);
  let daysMax = Math.round(diff * 21);

  // =========================
  // ВИТАМИНИ
  // =========================
 let vitamins = "";

if (age < 18) {
  vitamins =
    "Vitamin C: 75 mg<br>" +
    "Vitamin D: 600 IU<br>" +
    "Calcium: 1300 mg<br>" +
    "Magnesium: 300 mg<br>" +
    "Iron: 11 mg";
}

else if (age >= 18 && age < 50) {
  vitamins =
    "Vitamin C: 90 mg<br>" +
    "Vitamin D: 600 IU<br>" +
    "Calcium: 1000 mg<br>" +
    "Magnesium: 350 mg<br>" +
    "Iron: 18 mg";
}

else {
  vitamins =
    "Vitamin C: 100 mg<br>" +
    "Vitamin D: 800 IU<br>" +
    "Calcium: 1200 mg<br>" +
    "Magnesium: 400 mg<br>" +
    "Iron: 8 mg";
}
  // =========================
  // OUTPUT
  // =========================
  result.innerHTML =
    "🔥 Калории: " + targetCalories.toFixed(0) + " kcal<br><br>" +
    "💪 Протеин: " + protein.toFixed(0) + " g<br>" +
    "🧈 Мазнини: " + fats.toFixed(0) + " g<br>" +
    "🍞 Въглехидрати: " + carbs.toFixed(0) + " g<br><br>" +
    "💧 Вода: " + water.toFixed(2) + " L<br>" +
    "🚶 Стъпки: ~" + steps + "<br><br>" +
    "🎯 Цел: " + goal + "<br>" +
    "⏳ Време: ~ " + daysMin + " – " + daysMax + " дни<br><br>" +
    "🥦 Витамини:<br>" + vitamins;
}

</script>

</body>
</html>
