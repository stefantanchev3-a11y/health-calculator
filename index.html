<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Здравен калкулатор</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .box {
      background: #1f1f1f;
      padding: 20px;
      border-radius: 15px;
      max-width: 420px;
      margin: auto;
    }

    input, select, button {
      margin: 8px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      width: 80%;
    }

    button {
      background: #00c853;
      color: white;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🍽️ Дневен хранителен калкулатор</h2>

  <input id="weight" placeholder="Тегло (кг)">
  <input id="height" placeholder="Височина (см)">
  <input id="age" placeholder="Възраст">

  <select id="gender">
    <option value="male">Мъж</option>
    <option value="female">Жена</option>
  </select>

  <select id="activity">
    <option value="25">Ниска активност</option>
    <option value="30">Средна активност</option>
    <option value="35">Висока активност</option>
  </select>

  <button onclick="calc()">Изчисли</button>

  <div id="result"></div>
</div>

<script>
function calc() {
  let w = parseFloat(document.getElementById("weight").value);
  let h = parseFloat(document.getElementById("height").value);
  let age = parseFloat(document.getElementById("age").value);
  let activity = parseFloat(document.getElementById("activity").value);

  if (!w || !h || !age) {
    document.getElementById("result").innerHTML = "⚠️ Въведи всички данни!";
    return;
  }

  // 🔥 Калории
  let calories = w * activity;

  // 💪 Макроси
  let protein = w * 1.5;
  let fats = (calories * 0.25) / 9;
  let carbs = (calories - (protein * 4 + fats * 9)) / 4;

  // 💧 Вода
  let water = w * 0.033;

  // 🚶 Стъпки
  let steps = activity == 25 ? 5000 : activity == 30 ? 8000 : 12000;

  // 🥦 Витамини
  let vitamins = `
    🥦 Vitamin C: 90 mg<br>
    ☀️ Vitamin D: 600 IU<br>
    💪 Calcium: 1000 mg<br>
    ⚡ Iron: 18 mg<br>
    🧠 Magnesium: 350 mg
  `;

  // 📊 Резултат
  document.getElementById("result").innerHTML =
    "🔥 Калории: " + calories.toFixed(0) + " kcal<br><br>" +

    "💪 Протеин: " + protein.toFixed(0) + " g<br>" +
    "🧈 Мазнини: " + fats.toFixed(0) + " g<br>" +
    "🍞 Въглехидрати: " + carbs.toFixed(0) + " g<br><br>" +

    "💧 Вода: " + water.toFixed(2) + " L<br>" +
    "🚶 Стъпки: ~" + steps + " / ден<br><br>" +

    "🥦 Витамини:<br>" +
    vitamins;
}
</script>

</body>
</html>
